var board=document.getElementById('board');
DATA.forEach(function(d){
  var el=document.createElement('div');
  el.className='st';el.setAttribute('data-c',d.c);el.setAttribute('tabindex','0');
  el.innerHTML='<span class="emo">'+ICONS[d.i]+'</span><span class="lab">'+d.l+'</span>';
  el.addEventListener('click',function(){openCard(d);});
  el.addEventListener('keydown',function(ev){if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();openCard(d);}});
  board.appendChild(el);
});
var ov=document.getElementById('ov');
function openCard(d){
  if(d.scroll){var t=document.querySelector(d.scroll);if(t)t.scrollIntoView({behavior:'smooth'});return;}
  document.getElementById('pe').innerHTML=ICONS[d.i];
  document.getElementById('pt').textContent=d.t;
  document.getElementById('pb').textContent=d.b||'';
  var pi=document.getElementById('pimg');if(d.img){pi.src=d.img;pi.style.display='block';}else{pi.style.display='none';pi.removeAttribute('src');}
  var pl=document.getElementById('pl');pl.innerHTML='';
  if(d.list){d.list.forEach(function(it){var li=document.createElement('li');li.innerHTML='<span class="y">'+it[0]+'</span><span>'+it[1]+'</span>';pl.appendChild(li);});}
  var gw=document.getElementById('gw');gw.innerHTML='';
  if(d.link){var a=document.createElement('a');a.className='go';a.href=d.link;a.textContent=d.cta||'보러 가기';if(d.link.indexOf('http')===0){a.target='_blank';a.rel='noopener';}gw.appendChild(a);}
  ov.classList.add('on');
}
function closeCard(){ov.classList.remove('on');}
document.getElementById('x').addEventListener('click',closeCard);
ov.addEventListener('click',function(e){if(e.target===ov)closeCard();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCard();});
</script>
